<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreBid Master AI | Modular Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #00f2ff;
            --bg-dark: #0a0b1e;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: #050505;
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 240px;
            background: #0a0b1e;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--neon-purple);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
            font-size: 14px;
        }

        nav a:hover, nav a.active {
            background: var(--panel-bg);
            color: #fff;
            box-shadow: inset 2px 0 0 var(--neon-purple);
        }

        /* Main Content Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #1a1b3a, #050505);
            overflow-y: auto;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Cards & Components */
        .card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        h2 { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neon-blue); margin-top: 0; }

        .btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.8; }

        /* Editable Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: var(--neon-purple); font-size: 12px; text-transform: uppercase; }
        td input { background: transparent; border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 5px; border-radius: 4px; width: 100%; }

        /* W2 Preview Simulator */
        .phone-simulator {
            width: 300px;
            height: 533px;
            background: #000;
            border: 10px solid #222;
            border-radius: 30px;
            margin: 0 auto;
            position: relative;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🦅 PREBID MASTER</div>
        <a href="#W1" id="nav-W1" class="active">W1: Neural Recon</a>
        <a href="#W2" id="nav-W2">W2: Visual Synth</a>
        <a href="#W3" id="nav-W3">W3: Compliance Agent</a>
        <div style="margin-top: auto; font-size: 10px; color: #444;">V3.0 Modular Architecture</div>
    </nav>

    <main>
        <header>
            <div id="breadcrumb">Workspace / Neural Recon</div>
            <div class="status-badge" style="color: var(--neon-blue);">● SYSTEM READY</div>
        </header>

        <div id="router-view" class="view-content">
            <!-- Dynamic Content Load Here -->
        </div>
    </main>

    <script>
        const views = {
            W1: `
                <h2>W1: Neural Recon (RFP Parsing)</h2>
                <div class="card">
                    <p>Upload RFP (PDF/DOCX) for multi-modal analysis.</p>
                    <input type="file" id="rfp-upload" style="margin-bottom: 20px;">
                    <br>
                    <button class="btn" onclick="simulateScan()">Start AI Extraction</button>
                    <div id="scan-log" style="margin-top: 20px; font-family: monospace; font-size: 12px; color: #666;"></div>
                </div>
            `,
            W2: `
                <h2>W2: Visual Synth (9:16 Design)</h2>
                <div style="display: flex; gap: 40px;">
                    <div style="flex: 1;">
                        <div class="card">
                            <h3>Style Selector</h3>
                            <select style="width: 100%; padding: 10px; background: #1a1b3a; color: #fff; border: 1px solid #333;">
                                <option>Sci-Fi (Neon Tech)</option>
                                <option>Gov-Biz (Strict Blue)</option>
                                <option>Modern SaaS (Glassmorphism)</option>
                            </select>
                        </div>
                        <button class="btn" style="width: 100%;">Generate 9:16 Assets</button>
                    </div>
                    <div class="phone-simulator">
                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444;">PREVIEW IDLE</div>
                    </div>
                </div>
            `,
            W3: `
                <h2>W3: Compliance & Bid Generation</h2>
                <div class="card">
                    <h3>Scoring & Page Mapping (Editable)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Score Point</th>
                                <th>Requirement</th>
                                <th>RFP Page #</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="mapping-table">
                            <tr>
                                <td>Face Intel</td>
                                <td>Real-time Scoring</td>
                                <td><input type="text" value="32" onchange="syncManifest()"></td>
                                <td style="color: #00ff88;">MATCHED</td>
                            </tr>
                            <tr>
                                <td>★ Throughput</td>
                                <td>≥ 3200 faces/min</td>
                                <td><input type="text" value="32" onchange="syncManifest()"></td>
                                <td style="color: #00ff88;">MATCHED</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button class="btn">Export Full Strike Manifest</button>
            `
        };

        function simulateScan() {
            const log = document.getElementById('scan-log');
            log.innerHTML += "> Initializing OCR Logic...<br>";
            setTimeout(() => { log.innerHTML += "> Mapping Clause ★ 8.1...<br>"; }, 1000);
            setTimeout(() => { log.innerHTML += "> RFP Structural blueprint built.<br>"; }, 2000);
        }

        function syncManifest() {
            console.log("Syncing mapping to neural_manifest.md...");
            // Logic to call backend API
        }

        function handleRoute() {
            const path = window.location.hash.replace('#', '') || 'W1';
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + path).classList.add('active');
            
            const breadcrumb = document.getElementById('breadcrumb');
            const titles = { W1: 'Neural Recon', W2: 'Visual Synth', W3: 'Compliance Agent' };
            breadcrumb.innerText = 'Workspace / ' + titles[path];
            
            document.getElementById('router-view').innerHTML = views[path];
        }

        window.addEventListener('hashchange', handleRoute);
        window.onload = handleRoute;
    </script>
</body>
</html>
